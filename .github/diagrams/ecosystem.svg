<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-chat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-finance" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-soon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Connection lines -->
  <line x1="400" y1="110" x2="140" y2="190" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="400" y1="110" x2="400" y2="190" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="400" y1="110" x2="660" y2="190" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- Connector dots -->
  <circle cx="400" cy="115" r="4" fill="#6366f1"/>
  <circle cx="140" cy="190" r="4" fill="#14b8a6"/>
  <circle cx="400" cy="190" r="4" fill="#f59e0b"/>
  <circle cx="660" cy="190" r="4" fill="#64748b"/>

  <!-- Main card: Pulse Design System -->
  <rect x="225" y="20" width="350" height="90" rx="12" fill="url(#grad-main)" filter="url(#shadow)"/>
  <text x="400" y="52" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Pulse Design System</text>
  <text x="400" y="72" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="system-ui, sans-serif" font-size="11">100+ components · Tokens · Layouts</text>
  <text x="400" y="92" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="system-ui, sans-serif" font-size="11">Dark/Light · i18n · 3 languages</text>

  <!-- Card: Pulse Chat -->
  <rect x="30" y="200" width="220" height="120" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="200" width="220" height="4" rx="2" fill="url(#grad-chat)"/>
  <text x="140" y="232" text-anchor="middle" fill="#0f172a" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Pulse Chat</text>
  <text x="140" y="254" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Real-time · WebSocket</text>
  <text x="140" y="274" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Express · Socket.io · Prisma</text>
  <rect x="100" y="288" width="80" height="20" rx="10" fill="#ccfbf1"/>
  <text x="140" y="302" text-anchor="middle" fill="#0d9488" font-family="system-ui, sans-serif" font-size="10" font-weight="600">98 tests</text>

  <!-- Card: Pulse Finance -->
  <rect x="290" y="200" width="220" height="120" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="290" y="200" width="220" height="4" rx="2" fill="url(#grad-finance)"/>
  <text x="400" y="232" text-anchor="middle" fill="#0f172a" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Pulse Finance</text>
  <text x="400" y="254" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Dashboard · Clean Architecture</text>
  <text x="400" y="274" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Hono · Prisma · Redis · BullMQ</text>
  <rect x="360" y="288" width="80" height="20" rx="10" fill="#fef3c7"/>
  <text x="400" y="302" text-anchor="middle" fill="#d97706" font-family="system-ui, sans-serif" font-size="10" font-weight="600">143 tests</text>

  <!-- Card: Coming Soon -->
  <rect x="550" y="200" width="220" height="120" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="550" y="200" width="220" height="4" rx="2" fill="url(#grad-soon)"/>
  <text x="660" y="232" text-anchor="middle" fill="#0f172a" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Coming Soon</text>
  <text x="660" y="254" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Vexiat · Pulse Market</text>
  <text x="660" y="274" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Pulse AI</text>
  <rect x="620" y="288" width="80" height="20" rx="10" fill="#f1f5f9"/>
  <text x="660" y="302" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10" font-weight="600">in progress</text>
</svg>
